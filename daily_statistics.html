<!DOCTYPE html>
<html>
<head>
  <title>Daily Statistics</title>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#0b1e2d;
      color:white;
      margin:20px;
    }

    h1,h2{
      color:#a0c4ff;
      text-align:center;
    }

    a{
      color:#a0c4ff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      color:black;
      font-size:12px;
    }

    th,td{
      border:1px solid #999;
      padding:4px;
      text-align:center;
    }

    th{
      background:#ece9d8;
    }
  </style>
</head>
<body>

<a href="index.html">← Back to Dashboard</a>

<h1>Esperence Weather Station</h1>
<h2>Daily Statistics</h2>

<table>

<thead>
<tr>
  <th>Date</th>

  <th>Min T</th>
  <th>Max T</th>
  <th>Avg T</th>

  <th>Max RH</th>
  <th>Min RH</th>
  <th>Avg RH</th>

  <th>Max SLP</th>
  <th>Min SLP</th>
  <th>Avg SLP</th>

  <th>Max DP</th>
  <th>Min DP</th>
  <th>Avg DP</th>

  <th>Ter Min</th>

  <th>Prev Dir</th>
  <th>Avg Wind</th>

  <th>Max Gust</th>
  <th>Gust Dir</th>

  <th>Max Solar</th>
  <th>Solar Energy</th>

  <th>Max UV</th>
  <th>UV MEDs</th>

  <th>Heat Index</th>
  <th>Wind Chill</th>
  <th>THSW</th>

  <th>Rain</th>
  <th>ET</th>
</tr>
</thead>

<tbody id="statsTable">
</tbody>

</table>

<script>

async function loadDailyStatistics(){

  const table =
    document.getElementById("statsTable");

  table.innerHTML = "";

  for(let day=1; day<=31; day++){

    const tr =
      document.createElement("tr");

    tr.innerHTML = `
      <td>${day}</td>

      <td></td>
      <td></td>
      <td></td>

      <td></td>
      <td></td>
      <td></td>

      <td></td>
      <td></td>
      <td></td>

      <td></td>
      <td></td>
      <td></td>

      <td></td>

      <td></td>
      <td></td>

      <td></td>
      <td></td>

      <td></td>
      <td></td>

      <td></td>
      <td></td>

      <td></td>
      <td></td>
      <td></td>

      <td></td>
      <td></td>
    `;

    table.appendChild(tr);
  }
}

loadDailyStatistics();

</script>

</body>
</html>
