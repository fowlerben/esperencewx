name: Archive Backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Backfill archive
        run: |

          if [ ! -f archive_history.json ]; then
            echo "[]" > archive_history.json
          fi

          CURRENT=1751223600
          NOW=1751835600

          while [ "$CURRENT" -lt "$NOW" ]; do

            NEXT=$((CURRENT + 86400))

            TIMESTAMP=$(date +%s)

            PARAMS="api-key${{ secrets.WL_API_KEY }}end-timestamp${NEXT}start-timestamp${CURRENT}station-id${{ secrets.WL_STATION_ID }}t${TIMESTAMP}"

            SIGNATURE=$(printf "%s" "$PARAMS" | openssl dgst -sha256 -hmac "${{ secrets.WL_API_SECRET }}" | awk '{print $2}')

            URL="https://api.weatherlink.com/v2/historic/${{ secrets.WL_STATION_ID }}?api-key=${{ secrets.WL_API_KEY }}&start-timestamp=${CURRENT}&end-timestamp=${NEXT}&t=${TIMESTAMP}&api-signature=${SIGNATURE}"

            echo "Fetching $CURRENT -> $NEXT"

            curl -s "$URL" > historic.json

            jq '
          [
            (
              .sensors[]
              | select(.lsid==553786)
              | .data[]
              | {
                  time: .ts,
          
                  temp_hi,
                  temp_lo,
                  temp_hi_at,
                  temp_lo_at,
          
                  temp_last,
                  temp_avg,
          
                  hum_hi,
                  hum_lo,
                  hum_hi_at,
                  hum_lo_at,
                  hum_last,
          
                  dew_point_hi,
                  dew_point_lo,
                  dew_point_hi_at,
                  dew_point_lo_at,
                  dew_point_last,
          
                  wet_bulb_hi,
                  wet_bulb_lo,
                  wet_bulb_hi_at,
                  wet_bulb_lo_at,
                  wet_bulb_last,
          
                  heat_index_hi,
                  heat_index_hi_at,
                  heat_index_last,
          
                  wind_chill_last,
          
                  thw_index_hi,
                  thw_index_lo,
                  thw_index_hi_at,
                  thw_index_lo_at,
                  thw_index_last,
          
                  thsw_index_hi,
                  thsw_index_lo,
                  thsw_index_hi_at,
                  thsw_index_lo_at,
                  thsw_index_last,
          
                  wind_speed_hi,
                  wind_speed_hi_at,
                  wind_speed_avg,
                  wind_dir_of_prevail,
          
                  rain_rate_hi_mm,
                  rain_rate_hi_in,
                  rain_rate_hi_clicks,
                  rain_rate_hi_at,
          
                  rainfall_mm,
                  rainfall_in,
                  rainfall_clicks,
          
                  solar_rad_hi,
                  solar_rad_hi_at,
                  solar_rad_avg,
          
                  solar_energy,
          
                  uv_index_hi,
                  uv_index_hi_at,
                  uv_index_avg,
          
                  uv_dose,
          
                  wind_run,
          
                  et
                }
            ),
          
            (
              .sensors[]
              | select(.lsid==838746)
              | .data[]
              | {
                  time: .ts,
          
                  temp_lo_1,
                  temp_last_1,
          
                  temp_lo_2,
                  temp_last_2,
          
                  temp_lo_3,
                  temp_last_3,
          
                  temp_lo_4,
                  temp_last_4,
          
                  wet_leaf_hi_1,
                  wet_leaf_last_1,
                  wet_leaf_last_volt_1
                }
            ),
          
            (
              .sensors[]
              | select(.lsid==552869)
              | .data[]
              | {
                  time: .ts,
          
                  solar_rad_avg_552869: .solar_rad_avg,
                  solar_rad_hi_552869: .solar_rad_hi,
          
                  uv_index_avg_552869: .uv_index_avg,
                  uv_index_hi_552869: .uv_index_hi,
          
                  solar_energy_552869: .solar_energy
                }
            ),
          
            (
              .sensors[]
              | select(.lsid==551509)
              | .data[]
              | {
                  time: .ts,
          
                  bar_absolute,
                  bar_sea_level,
          
                  bar_hi,
                  bar_lo
                }
            ),
          
            (
              .sensors[]
              | select(.lsid==551510)
              | .data[]
              | {
                  time: .ts,
          
                  temp_in_last,
                  hum_in_last,
          
                  dew_point_in,
                  heat_index_in,
          
                  temp_in_hi,
                  temp_in_lo
                }
            )
          ]
          | group_by(.time)
          | map(add)
            ' historic.json > archive_records.json

            jq -s '
              add
              | unique_by(.time)
              | sort_by(.time)
            ' archive_history.json archive_records.json > archive_tmp.json

            mv archive_tmp.json archive_history.json

            CURRENT=$NEXT

          done

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add archive_history.json
          git commit -m "archive backfill" || echo "no changes"
          git push
