name: Weather Update

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch clean JSON
        run: |
          TIMESTAMP=$(date +%s)

          echo "TIMESTAMP=$TIMESTAMP"

          PARAMS="api-key${{ secrets.WL_API_KEY }}station-id${{ secrets.WL_STATION_ID }}t${TIMESTAMP}"

          SIGNATURE=$(printf "%s" "$PARAMS" | openssl dgst -sha256 -hmac "${{ secrets.WL_API_SECRET }}" | awk '{print $2}')

          echo "SIGNATURE=$SIGNATURE"

          URL="https://api.weatherlink.com/v2/current/${{ secrets.WL_STATION_ID }}?api-key=${{ secrets.WL_API_KEY }}&t=${TIMESTAMP}&api-signature=${SIGNATURE}"

          echo "Requesting:"
          echo "$URL"

          curl -s "$URL" > response.json

          echo "===== FIRST 100 LINES OF RESPONSE ====="
          head -100 response.json

          echo "===== GENERATED_AT ====="
          jq '.generated_at' response.json || true

          echo "===== SENSOR TIMESTAMPS ====="
          jq '.sensors[] | {lsid: .lsid, ts: .data[0].ts}' response.json || true

          jq '.' response.json > weather.json
          
      - name: Update archive history
        run: |
          if [ ! -f archive_history.json ]; then
            echo "[]" > archive_history.json
          fi

          TIMESTAMP=$(date +%s)

          END_TS=$(date +%s)
          START_TS=$((END_TS - 86400))

          PARAMS="api-key${{ secrets.WL_API_KEY }}end-timestamp${END_TS}start-timestamp${START_TS}station-id${{ secrets.WL_STATION_ID }}t${TIMESTAMP}"

          SIGNATURE=$(printf "%s" "$PARAMS" | openssl dgst -sha256 -hmac "${{ secrets.WL_API_SECRET }}" | awk '{print $2}')

          URL="https://api.weatherlink.com/v2/historic/${{ secrets.WL_STATION_ID }}?api-key=${{ secrets.WL_API_KEY }}&start-timestamp=${START_TS}&end-timestamp=${END_TS}&t=${TIMESTAMP}&api-signature=${SIGNATURE}"

          curl -s "$URL" > historic.json

          jq '
          [
            .sensors[]
            | select(.lsid==553786)
            | .data[]
            | {
                time: .ts,

                temp_hi,
                temp_lo,
                temp_hi_at,
                temp_lo_at,

                hum_hi,
                hum_lo,
                hum_hi_at,
                hum_lo_at,

                dew_point_hi,
                dew_point_lo,
                dew_point_hi_at,
                dew_point_lo_at,

                wet_bulb_hi,
                wet_bulb_lo,
                wet_bulb_hi_at,
                wet_bulb_lo_at,

                heat_index_hi,
                heat_index_hi_at,

                thw_index_hi,
                thw_index_lo,
                thw_index_hi_at,
                thw_index_lo_at,

                thsw_index_hi,
                thsw_index_lo,
                thsw_index_hi_at,
                thsw_index_lo_at,

                wind_speed_hi,
                wind_speed_hi_at,

                rain_rate_hi_mm,
                rain_rate_hi_in,
                rain_rate_hi_clicks,
                rain_rate_hi_at,

                rainfall_mm,
                rainfall_in,
                rainfall_clicks,

                solar_rad_hi,
                solar_rad_hi_at,

                solar_energy,

                uv_index_hi,
                uv_index_hi_at,

                uv_dose,

                wind_run,

                et
              }
          ]
          ' historic.json > archive_records.json

          jq -s '
            add
            | unique_by(.time)
            | sort_by(.time)
          ' archive_history.json archive_records.json > archive_tmp.json

          mv archive_tmp.json archive_history.json
      - name: Update history
        run: |
          if [ ! -f history.json ]; then
            echo "[]" > history.json
          fi

          jq --argjson obs "$(cat weather.json)" '
            . + [{
              time: $obs.generated_at,

              temp_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].temp) - 32)
                * 5 / 9
              ),
              
              dew_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].dew_point) - 32)
                * 5 / 9
              ),
              
              wetbulb_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].wet_bulb) - 32)
                * 5 / 9
              ),

              heatindex_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].heat_index) - 32)
                * 5 / 9
              ),

              windchill_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].wind_chill) - 32)
                * 5 / 9
              ),

              thw_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].thw_index) - 32)
                * 5 / 9
              ),

              thsw_c: (
                (($obs.sensors[] | select(.lsid==553786).data[0].thsw_index) - 32)
                * 5 / 9
              ),
              humidity: (
              
                $obs.sensors[] | select(.lsid==553786).data[0].hum
              ),

              pressure_hpa: (
                ($obs.sensors[] | select(.lsid==551509).data[0].bar_sea_level)
                * 33.8639
              ),

              station_pressure_hpa: (
                ($obs.sensors[] | select(.lsid==551509).data[0].bar_absolute)
                * 33.8639
              ),

              wind10_kmh: (
                ($obs.sensors[] | select(.lsid==553786).data[0].wind_speed_avg_last_10_min)
                * 1.60934
              ),

              gust10_kmh: (
                ($obs.sensors[] | select(.lsid==553786).data[0].wind_speed_hi_last_10_min)
                * 1.60934
              ),

              wind1_kmh: (
                ($obs.sensors[] | select(.lsid==553786).data[0].wind_speed_avg_last_1_min)
                * 1.60934
              ),

              wind2_kmh: (
                ($obs.sensors[] | select(.lsid==553786).data[0].wind_speed_avg_last_2_min)
                * 1.60934
              ),

              gust2_kmh: (
                ($obs.sensors[] | select(.lsid==553786).data[0].wind_speed_hi_last_2_min)
                * 1.60934
              ),

              solar_wm2: (
                $obs.sensors[] | select(.lsid==553786).data[0].solar_rad
              ),

              uv: (
                $obs.sensors[] | select(.lsid==553786).data[0].uv_index
              ),

              rainrate_mmhr: (
                $obs.sensors[] | select(.lsid==553786).data[0].rain_rate_last_mm
              ),
              
              rain_daily_mm: (
                $obs.sensors[] | select(.lsid==553786).data[0].rainfall_daily_mm
              ),

              leaf: (
                $obs.sensors[] | select(.lsid==838746).data[0].wet_leaf_1
              ),

              temp1_c: (
                (($obs.sensors[] | select(.lsid==838746).data[0].temp_1) - 32)
                * 5 / 9
              ),

              temp2_c: (
                (($obs.sensors[] | select(.lsid==838746).data[0].temp_2) - 32)
                * 5 / 9
              ),
              
              temp3_c: (
                (($obs.sensors[] | select(.lsid==838746).data[0].temp_3) - 32)
                * 5 / 9
              ),
              
              dpd_c: (
                (
                  (($obs.sensors[] | select(.lsid==553786).data[0].temp) - 32)
                  * 5 / 9
                )
                -
                (
                  (($obs.sensors[] | select(.lsid==553786).data[0].dew_point) - 32)
                  * 5 / 9
                )
              )
              
            }]
          ' history.json > history_tmp.json

          mv history_tmp.json history.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add weather.json history.json archive_history.json
          git commit -m "update weather" || echo "no changes"
          git push
