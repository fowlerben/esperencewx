name: Weather Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get station list (SIGNED REQUEST)
        run: |
          TIMESTAMP=$(date +%s)

          PARAMS="api-key${{ secrets.WL_API_KEY }}t${TIMESTAMP}"

          SIGNATURE=$(printf "%s" "$PARAMS" | openssl dgst -sha256 -hmac "${{ secrets.WL_API_SECRET }}" | awk '{print $2}')

          URL="https://api.weatherlink.com/v2/stations?api-key=${{ secrets.WL_API_KEY }}&t=${TIMESTAMP}&api-signature=${SIGNATURE}"

          curl -s "$URL" > weather.json

      - name: Commit station list
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add weather.json
          git commit -m "station list" || echo "no changes"
          git push
``
