<!DOCTYPE html>
<html>
<head>
  <title>Monthly Summary</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1e2d;
      color: white;
      margin: 20px;
    }

    h1, h2 {
      color: #a0c4ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      font-size: 13px;
    }
    
    th, td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }
    
    th {
      background: #ece9d8;
      font-weight: bold;
    }
    
    tbody tr:nth-child(even) {
      background: #f8f8f8;
    }

    th, td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }

    th {
      background: #e6e6cc;
    }

    a {
      color: #a0c4ff;
    }
  </style>
</head>

<body>

  <a href="index.html">← Back to Dashboard</a>

  <h1>Esperence Weather Station</h1>

  <h2 id="title">
    Monthly Weather Summary
  </h2>

  <table>
  
    <thead>
  
      <tr>
        <th rowspan="2">Date</th>
        <th rowspan="2">Day</th>
  
        <th rowspan="2">Min<br>Temp<br>°C</th>
  
        <th rowspan="2">Max<br>Temp<br>°C</th>
  
        <th rowspan="2">Rain<br>mm</th>
  
        <th rowspan="2">Evap<br>mm</th>
  
        <th rowspan="2">Sun<br>h</th>
  
        <th colspan="3">Max Wind Gust</th>
  
        <th colspan="6">9am Obs</th>
  
        <th colspan="6">3pm Obs</th>
      </tr>
  
      <tr>
        <th>Dir</th>
        <th>km/h</th>
        <th>Time</th>
  
      <th>Temp</th>
      <th>RH</th>
      <th>Cld</th>
      <th>Dir</th>
      <th>Spd</th>
      <th>MSLP</th>
      
      <th>Temp</th>
      <th>RH</th>
      <th>Cld</th>
      <th>Dir</th>
      <th>Spd</th>
      <th>MSLP</th>
      </tr>
  
    </thead>
  
    <tbody id="monthlyTable">
    </tbody>
  
  </table>

  <script>

  
function degToCompass(deg) {

  const dirs = [
    "N","NNE","NE","ENE",
    "E","ESE","SE","SSE",
    "S","SSW","SW","WSW",
    "W","WNW","NW","NNW"
  ];

  return dirs[
    Math.round(deg / 22.5) % 16
  ];
}

  
  async function loadMonthly() {
  
    const archiveRes =
      await fetch("archive_history.json?" + Date.now());
    
    const archive =
      await archiveRes.json();
    const historyRes =
      await fetch("history.json?" + Date.now());

    const history =
      await historyRes.json();
    const manualRes =
      await fetch("manual_obs.json?" + Date.now());
    
    const manualObs =
      await manualRes.json();
    console.log("Archive records:", archive.length);

    console.log(
      "First timestamp:",
      new Date(archive[0].time * 1000)
    );
    
    console.log(
      "Last timestamp:",
      new Date(archive[archive.length - 1].time * 1000)
    );
    
    const now = new Date();
  
    document.getElementById("title").innerText =
      now.toLocaleString("en-AU", {
        month: "long",
        year: "numeric"
      }) + " Daily Weather Observations";
  
    const year = now.getFullYear();
    const month = now.getMonth();
  
    const daysInMonth =
      new Date(year, month + 1, 0).getDate();
  
    const tbody =
      document.getElementById("monthlyTable");
  
    tbody.innerHTML = "";
    const stats = {
      minTemp: [],
      maxTemp: [],
      rain: [],
      evap: [],
      sun: [],
      gust: [],
    
      temp9: [],
      rh9: [],
      cloud9: [],
      wind9: [],
      mslp9: [],
    
      temp15: [],
      rh15: [],
      cloud15: [],
      wind15: [],
      mslp15: []
    };
  
    for (let day = 1; day <= daysInMonth; day++) {
  
      const d = new Date(year, month, day);
  
      const dayName =
        d.toLocaleDateString("en-AU", {
          weekday: "short"
        });
      const minStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const minEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const minRecords =
        archive.filter(r =>
          r.time > minStart &&
          r.time <= minEnd
        );
      if (day <= 5) {
        console.log(
          day,
          minRecords.length,
          new Date(minStart * 1000),
          new Date(minEnd * 1000)
        );
      }
      
      if (day === 1) {
        console.log(
          "Day 1 period:",
          new Date(minStart * 1000),
          "to",
          new Date(minEnd * 1000)
        );
      
        console.log(
          "Day 1 records found:",
          minRecords.length
        );
      
        if (minRecords.length > 0) {
          console.log(
            "First matching record:",
            minRecords[0]
          );
      
          console.log(
            "Last matching record:",
            minRecords[minRecords.length - 1]
          );
        }
      }
      
      
      const minValues =
        minRecords
          .map(r => r.temp_lo)
          .filter(v => v != null);

      if (day === 1) {
        console.log(
          "temp_lo count:",
          minValues.length
        );
      
        console.log(
          "sample temp_lo values:",
          minValues.slice(0, 10)
        );
      }
            
      const minComplete =
        minEnd < Date.now() / 1000;
      
      const minTemp =
        minComplete && minValues.length > 0
          ? (
              (Math.min(...minValues) - 32)
              * 5 / 9
            )
          : null;
      const maxStart =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const maxEnd =
        new Date(year, month, day + 1, 9, 0, 0).getTime() / 1000;
      
const maxRecords =
  archive.filter(r =>
    r.time > maxStart &&
    r.time <= maxEnd
  );
      
      const maxValues =
        maxRecords
          .map(r => r.temp_hi)
          .filter(v => v != null);
      
      const maxComplete =
        maxEnd <= Date.now() / 1000;
      
      const maxTemp =
        maxComplete &&
        maxValues.length > 0
          ? (
              (Math.max(...maxValues) - 32)
              * 5 / 9
            )
          : null;
      
      const rainStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const rainEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const rainRecords =
        archive.filter(r =>
          r.time > rainStart &&
          r.time <= rainEnd
        );
      
      const rainComplete =
        rainEnd <= Date.now() / 1000;
      
      const rainTotal =
        rainComplete && rainRecords.length > 0
          ? rainRecords.reduce(
              (sum, r) =>
                sum + Number(r.rainfall_mm || 0),
              0
            )
          : null;

      const evapStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const evapEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const evapRecords =
        archive.filter(r =>
          r.time > evapStart &&
          r.time <= evapEnd
        );
      
      const evapComplete =
        evapEnd <= Date.now() / 1000;
      
      const evapValues =
        evapRecords
          .map(r => Number(r.et))
          .filter(v => !isNaN(v));
      
      const evapTotal =
        evapComplete && evapRecords.length > 0
          ? evapRecords.reduce(
              (sum, r) =>
                sum + Number(r.et || 0),
              0
            ) * 25.4
          : null;

      const gustStart =
        new Date(year, month, day, 0, 0, 0).getTime() / 1000;
      
      const gustEnd =
        new Date(year, month, day + 1, 0, 0, 0).getTime() / 1000;
      
      const gustRecords =
        archive.filter(r =>
          r.time >= gustStart &&
          r.time < gustEnd
        );
      
      const maxGustRecord =
        gustRecords.length
          ? gustRecords.reduce((a, b) =>
              Number(b.wind_speed_hi || 0) >
              Number(a.wind_speed_hi || 0)
                ? b
                : a
            )
          : null;
      
      const maxGustSpeed =
        maxGustRecord
          ? Number(maxGustRecord.wind_speed_hi) * 1.60934
          : null;
      
      const maxGustTimestamp =
        maxGustRecord
          ? maxGustRecord.wind_speed_hi_at
          : null;

      const gustComplete =
        gustEnd <= Date.now() / 1000;

      const gustObs =
        maxGustTimestamp
          ? history.reduce((closest, r) =>
              Math.abs(r.time - maxGustTimestamp) <
              Math.abs(closest.time - maxGustTimestamp)
                ? r
                : closest
            )
          : null;

const maxGustDir =
  gustObs?.wind10_dir != null
    ? degToCompass(gustObs.wind10_dir)
    : "";

const maxGustTime =
  maxGustTimestamp
    ? new Date(maxGustTimestamp * 1000)
        .toLocaleTimeString("en-AU", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        })
    : "";
            
      const target9 =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const dayRecords9 =
        history.filter(r => {
          const t = new Date(r.time * 1000);
      
          return t.getFullYear() === year
            && t.getMonth() === month
            && t.getDate() === day;
        });
      
      const obs9 =
        dayRecords9.length > 0
          ? dayRecords9.reduce((closest, r) =>
              Math.abs(r.time - target9) <
              Math.abs(closest.time - target9)
                ? r
                : closest
            )
          : null;

      const obs9Valid =
        obs9 &&
        Math.abs(obs9.time - target9) <= 180;
      
      const target15 =
        new Date(year, month, day, 15, 0, 0).getTime() / 1000;
      
      const dayRecords15 =
        history.filter(r => {
          const t = new Date(r.time * 1000);
      
          return t.getFullYear() === year
            && t.getMonth() === month
            && t.getDate() === day;
        });
      
      const obs15 =
        dayRecords15.length > 0
          ? dayRecords15.reduce((closest, r) =>
              Math.abs(r.time - target15) <
              Math.abs(closest.time - target15)
                ? r
                : closest
            )
          : null;
      const obs15Valid =
        obs15 &&
        Math.abs(obs15.time - target15) <= 180;
      const dateString =
        `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      
      const manual =
        manualObs.find(r => r.date === dateString);
      if (minTemp != null) stats.minTemp.push(minTemp);
      if (maxTemp != null) stats.maxTemp.push(maxTemp);
      if (rainTotal != null) stats.rain.push(rainTotal);
      if (evapTotal != null) stats.evap.push(evapTotal);
      
      if (maxGustSpeed != null) stats.gust.push(maxGustSpeed);
      
      if (obs9Valid) {
        stats.temp9.push(obs9.temp_c);
        stats.rh9.push(obs9.humidity);
        stats.wind9.push(obs9.wind10_kmh);
        stats.mslp9.push(obs9.pressure_hpa);
      }
      
      if (manual?.cloud9)
        stats.cloud9.push(Number(manual.cloud9));
      
      if (obs15Valid) {
        stats.temp15.push(obs15.temp_c);
        stats.rh15.push(obs15.humidity);
        stats.wind15.push(obs15.wind10_kmh);
        stats.mslp15.push(obs15.pressure_hpa);
      }
      
      if (manual?.cloud15)
        stats.cloud15.push(Number(manual.cloud15));
const tr = document.createElement("tr");

tr.innerHTML = `
  <td>${day}</td>
  <td>${dayName}</td>

  <td>${minRecords.length}</td>

  <td>${maxTemp != null ? maxTemp.toFixed(1) : ""}</td>

  <td>${
    rainTotal != null
      ? rainTotal.toFixed(1)
      : ""
  }</td>

  <td>${
    evapTotal != null
      ? evapTotal.toFixed(1)
      : ""
  }</td>

  <td></td>

  <td>${gustComplete ? maxGustDir : ""}</td>

  <td>${
    gustComplete && maxGustSpeed != null
      ? maxGustSpeed.toFixed(0)
      : ""
  }</td>

  <td>${gustComplete ? maxGustTime : ""}</td>

  <td>${obs9Valid ? obs9.temp_c.toFixed(1) : (manual?.temp9 || "")}</td>
  <td>${obs9Valid ? obs9.humidity.toFixed(0) : (manual?.humidity9 || "")}</td>
  <td>${manual?.cloud9 || ""}</td>
  <td>${obs9Valid ? degToCompass(obs9.wind10_dir) : (manual?.wind9_dir || "")}</td>
  <td>${obs9Valid ? obs9.wind10_kmh.toFixed(0) : (manual?.wind9_kmh || "")}</td>
  <td>${obs9Valid ? obs9.pressure_hpa.toFixed(1) : (manual?.pressure9_hpa || "")}</td>

  <td>${obs15Valid ? obs15.temp_c.toFixed(1) : (manual?.temp15 || "")}</td>
  <td>${obs15Valid ? obs15.humidity.toFixed(0) : (manual?.humidity15 || "")}</td>
  <td>${manual?.cloud15 || ""}</td>
  <td>${obs15Valid ? degToCompass(obs15.wind10_dir) : (manual?.wind15_dir || "")}</td>
  <td>${obs15Valid ? obs15.wind10_kmh.toFixed(0) : (manual?.wind15_kmh || "")}</td>
  <td>${obs15Valid ? obs15.pressure_hpa.toFixed(1) : (manual?.pressure15_hpa || "")}</td>
`;

tbody.appendChild(tr);
    }

const separatorRow = document.createElement("tr");

separatorRow.innerHTML = `
  <td colspan="22" style="
    border-top: 3px solid black;
    background: white;
    height: 8px;
  "></td>
`;

tbody.appendChild(separatorRow);
const calcAvg = arr =>
  arr.length
    ? arr.reduce((a, b) => a + b, 0) / arr.length
    : null;

const calcMin = arr =>
  arr.length
    ? Math.min(...arr)
    : null;

const calcMax = arr =>
  arr.length
    ? Math.max(...arr)
    : null;

const calcSum = arr =>
  arr.length
    ? arr.reduce((a, b) => a + b, 0)
    : null;

const makeRow = (label, values) => {
  const tr = document.createElement("tr");

  const colour =
    label === "Highest"
      ? "red"
      : label === "Lowest"
      ? "blue"
      : "black";

  const cell = value =>
    value == null
      ? ""
      : `<span style="color:${colour}">${value}</span>`;

  tr.innerHTML = `
    <td colspan="2" style="font-weight:bold;background:#ece9d8;">
      ${label}
    </td>

    <td>${cell(values.minTemp)}</td>
    <td>${cell(values.maxTemp)}</td>
    <td>${cell(values.rain)}</td>
    <td>${cell(values.evap)}</td>
    <td></td>

    <td></td>
    <td>${cell(values.gust)}</td>
    <td></td>

    <td>${cell(values.temp9)}</td>
    <td>${cell(values.rh9)}</td>
    <td>${cell(values.cloud9)}</td>
    <td></td>
    <td>${cell(values.wind9)}</td>
    <td>${cell(values.mslp9)}</td>

    <td>${cell(values.temp15)}</td>
    <td>${cell(values.rh15)}</td>
    <td>${cell(values.cloud15)}</td>
    <td></td>
    <td>${cell(values.wind15)}</td>
    <td>${cell(values.mslp15)}</td>
  `;

  tbody.appendChild(tr);
};

makeRow("Mean", {
  minTemp: calcAvg(stats.minTemp)?.toFixed(1),
  maxTemp: calcAvg(stats.maxTemp)?.toFixed(1),
  evap: calcAvg(stats.evap)?.toFixed(1),
  gust: calcAvg(stats.gust)?.toFixed(0),

  temp9: calcAvg(stats.temp9)?.toFixed(1),
  rh9: calcAvg(stats.rh9)?.toFixed(0),
  cloud9: calcAvg(stats.cloud9)?.toFixed(0),
  wind9: calcAvg(stats.wind9)?.toFixed(0),
  mslp9: calcAvg(stats.mslp9)?.toFixed(1),

  temp15: calcAvg(stats.temp15)?.toFixed(1),
  rh15: calcAvg(stats.rh15)?.toFixed(0),
  cloud15: calcAvg(stats.cloud15)?.toFixed(0),
  wind15: calcAvg(stats.wind15)?.toFixed(0),
  mslp15: calcAvg(stats.mslp15)?.toFixed(1)
});

makeRow("Lowest", {
  minTemp: calcMin(stats.minTemp)?.toFixed(1),
  maxTemp: calcMin(stats.maxTemp)?.toFixed(1),
  evap: calcMin(stats.evap)?.toFixed(1),
  gust: calcMin(stats.gust)?.toFixed(0),

  temp9: calcMin(stats.temp9)?.toFixed(1),
  rh9: calcMin(stats.rh9)?.toFixed(0),
  cloud9: calcMin(stats.cloud9)?.toFixed(0),
  wind9: calcMin(stats.wind9)?.toFixed(0),
  mslp9: calcMin(stats.mslp9)?.toFixed(1),

  temp15: calcMin(stats.temp15)?.toFixed(1),
  rh15: calcMin(stats.rh15)?.toFixed(0),
  cloud15: calcMin(stats.cloud15)?.toFixed(0),
  wind15: calcMin(stats.wind15)?.toFixed(0),
  mslp15: calcMin(stats.mslp15)?.toFixed(1)
});

makeRow("Highest", {
  minTemp: calcMax(stats.minTemp)?.toFixed(1),
  maxTemp: calcMax(stats.maxTemp)?.toFixed(1),
  rain: calcMax(stats.rain)?.toFixed(1),
  evap: calcMax(stats.evap)?.toFixed(1),
  gust: calcMax(stats.gust)?.toFixed(0),

  temp9: calcMax(stats.temp9)?.toFixed(1),
  rh9: calcMax(stats.rh9)?.toFixed(0),
  cloud9: calcMax(stats.cloud9)?.toFixed(0),
  wind9: calcMax(stats.wind9)?.toFixed(0),
  mslp9: calcMax(stats.mslp9)?.toFixed(1),

  temp15: calcMax(stats.temp15)?.toFixed(1),
  rh15: calcMax(stats.rh15)?.toFixed(0),
  cloud15: calcMax(stats.cloud15)?.toFixed(0),
  wind15: calcMax(stats.wind15)?.toFixed(0),
  mslp15: calcMax(stats.mslp15)?.toFixed(1)
});

makeRow("Total", {
  rain: calcSum(stats.rain)?.toFixed(1),
  evap: calcSum(stats.evap)?.toFixed(1)
});

}

loadMonthly();
  
  </script>

</body>
</html>
