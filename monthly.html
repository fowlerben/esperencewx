<!DOCTYPE html>
<html>
<head>
  <title>Monthly Summary</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1e2d;
      color: white;
      margin: 20px;
    }

    h1, h2 {
      color: #a0c4ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      font-size: 13px;
    }
    
    th, td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }
    
    th {
      background: #ece9d8;
      font-weight: bold;
    }
    
    tbody tr:nth-child(even) {
      background: #f8f8f8;
    }

    th, td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }

    th {
      background: #e6e6cc;
    }

    a {
      color: #a0c4ff;
    }
  </style>
</head>

<body>

  <a href="index.html">← Back to Dashboard</a>

  <h1>Esperence Weather Station</h1>

  <h2 id="title">
    Monthly Weather Summary
  </h2>

  <table>
  
    <thead>
  
      <tr>
        <th rowspan="2">Date</th>
        <th rowspan="2">Day</th>
  
        <th rowspan="2">Min<br>Temp<br>°C</th>
  
        <th rowspan="2">Max<br>Temp<br>°C</th>
  
        <th rowspan="2">Rain<br>mm</th>
  
        <th rowspan="2">Evap<br>mm</th>
  
        <th rowspan="2">Sun<br>h</th>
  
        <th colspan="3">Max Wind Gust</th>
  
        <th colspan="3">9am Obs</th>
  
        <th colspan="3">3pm Obs</th>
      </tr>
  
      <tr>
        <th>Dir</th>
        <th>km/h</th>
        <th>Time</th>
  
        <th>Temp</th>
        <th>RH</th>
        <th>MSLP</th>
  
        <th>Temp</th>
        <th>RH</th>
        <th>MSLP</th>
      </tr>
  
    </thead>
  
    <tbody id="monthlyTable">
    </tbody>
  
  </table>

  <script>
  
  async function loadMonthly() {
  
    const archiveRes =
      await fetch("archive_history.json?" + Date.now());
    
    const archive =
      await archiveRes.json();
    
    const now = new Date();
  
    document.getElementById("title").innerText =
      now.toLocaleString("en-AU", {
        month: "long",
        year: "numeric"
      }) + " Daily Weather Observations";
  
    const year = now.getFullYear();
    const month = now.getMonth();
  
    const daysInMonth =
      new Date(year, month + 1, 0).getDate();
  
    const tbody =
      document.getElementById("monthlyTable");
  
    tbody.innerHTML = "";
  
    for (let day = 1; day <= daysInMonth; day++) {
  
      const d = new Date(year, month, day);
  
      const dayName =
        d.toLocaleDateString("en-AU", {
          weekday: "short"
        });
      const minStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const minEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const minRecords =
        archive.filter(r =>
          r.time > minStart &&
          r.time <= minEnd
        );
      
      if (day === 1) {
        document.getElementById("title").innerText =
          "1 Jul records found: " + minRecords.length;
      }
      
      const minValues =
        minRecords
          .map(r => r.temp_lo)
          .filter(v => v != null);
            
      const minComplete =
        minEnd <= Date.now() / 1000;
      
      const minTemp =
        minComplete && minValues.length > 0
          ? (
              (Math.min(...minValues) - 32)
              * 5 / 9
            )
          : null;
      const tr = document.createElement("tr");
  
      tr.innerHTML = `
        <td>${day}</td>
        <td>${dayName}</td>
  
        <td>
          ${minTemp != null ? minTemp.toFixed(1) : ""}
        </td>
        
        <td></td>
        <td></td>
        <td></td>
        <td></td>
  
        <td></td>
        <td></td>
        <td></td>
  
        <td></td>
        <td></td>
        <td></td>
  
        <td></td>
        <td></td>
        <td></td>
      `;
  
      tbody.appendChild(tr);
    }
  }
  
  loadMonthly();
  
  </script>

</body>
</html>
