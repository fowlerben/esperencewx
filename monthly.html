<!DOCTYPE html>
<html>
<head>
  <title>Monthly Summary</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1e2d;
      color: white;
      margin: 20px;
    }

    h1, h2 {
      color: #a0c4ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      font-size: 13px;
    }
    
    th, td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }
    
    th {
      background: #ece9d8;
      font-weight: bold;
    }
    
    tbody tr:nth-child(even) {
      background: #f8f8f8;
    }

    th, td {
      border: 1px solid #999;
      padding: 4px;
      text-align: center;
    }

    th {
      background: #e6e6cc;
    }

    a {
      color: #a0c4ff;
    }
  </style>
</head>

<body>

  <a href="index.html">← Back to Dashboard</a>

  <h1>Esperence Weather Station</h1>

  <h2 id="title">
    Monthly Weather Summary
  </h2>

  <table>
  
    <thead>
  
      <tr>
        <th rowspan="2">Date</th>
        <th rowspan="2">Day</th>
  
        <th rowspan="2">Min<br>Temp<br>°C</th>
  
        <th rowspan="2">Max<br>Temp<br>°C</th>
  
        <th rowspan="2">Rain<br>mm</th>
  
        <th rowspan="2">Evap<br>mm</th>
  
        <th rowspan="2">Sun<br>h</th>
  
        <th colspan="3">Max Wind Gust</th>
  
        <th colspan="6">9am Obs</th>
  
        <th colspan="6">3pm Obs</th>
      </tr>
  
      <tr>
        <th>Dir</th>
        <th>km/h</th>
        <th>Time</th>
  
      <th>Temp</th>
      <th>RH</th>
      <th>Cld</th>
      <th>Dir</th>
      <th>Spd</th>
      <th>MSLP</th>
      
      <th>Temp</th>
      <th>RH</th>
      <th>Cld</th>
      <th>Dir</th>
      <th>Spd</th>
      <th>MSLP</th>
      </tr>
  
    </thead>
  
    <tbody id="monthlyTable">
    </tbody>
  
  </table>

  <script>

  
function degToCompass(deg) {

  const dirs = [
    "N","NNE","NE","ENE",
    "E","ESE","SE","SSE",
    "S","SSW","SW","WSW",
    "W","WNW","NW","NNW"
  ];

  return dirs[
    Math.round(deg / 22.5) % 16
  ];
}

  
  async function loadMonthly() {
  
    const archiveRes =
      await fetch("archive_history.json?" + Date.now());
    
    const archive =
      await archiveRes.json();
    const historyRes =
      await fetch("history.json?" + Date.now());

    const history =
      await historyRes.json();
    const manualRes =
      await fetch("manual_obs.json?" + Date.now());
    
    const manualObs =
      await manualRes.json();
    console.log("Archive records:", archive.length);

    console.log(
      "First timestamp:",
      new Date(archive[0].time * 1000)
    );
    
    console.log(
      "Last timestamp:",
      new Date(archive[archive.length - 1].time * 1000)
    );
    
    const now = new Date();
  
    document.getElementById("title").innerText =
      now.toLocaleString("en-AU", {
        month: "long",
        year: "numeric"
      }) + " Daily Weather Observations";
  
    const year = now.getFullYear();
    const month = now.getMonth();
  
    const daysInMonth =
      new Date(year, month + 1, 0).getDate();
  
    const tbody =
      document.getElementById("monthlyTable");
  
    tbody.innerHTML = "";
  
    for (let day = 1; day <= daysInMonth; day++) {
  
      const d = new Date(year, month, day);
  
      const dayName =
        d.toLocaleDateString("en-AU", {
          weekday: "short"
        });
      const minStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const minEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const minRecords =
        archive.filter(r =>
          r.time >= minStart &&
          r.time < minEnd
        );
      
      if (day === 1) {
        console.log(
          "Day 1 period:",
          new Date(minStart * 1000),
          "to",
          new Date(minEnd * 1000)
        );
      
        console.log(
          "Day 1 records found:",
          minRecords.length
        );
      
        if (minRecords.length > 0) {
          console.log(
            "First matching record:",
            minRecords[0]
          );
      
          console.log(
            "Last matching record:",
            minRecords[minRecords.length - 1]
          );
        }
      }
      
      
      const minValues =
        minRecords
          .map(r => r.temp_lo)
          .filter(v => v != null);

      if (day === 1) {
        console.log(
          "temp_lo count:",
          minValues.length
        );
      
        console.log(
          "sample temp_lo values:",
          minValues.slice(0, 10)
        );
      }
            
      const minComplete =
        minEnd < Date.now() / 1000;
      
      const minTemp =
        minComplete && minValues.length > 0
          ? (
              (Math.min(...minValues) - 32)
              * 5 / 9
            )
          : null;
      const maxStart =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const maxEnd =
        new Date(year, month, day + 1, 9, 0, 0).getTime() / 1000;
      
      const maxTempStart =
        new Date(year, month, 6, 9, 5, 0).getTime() / 1000;
      
      const maxRecords =
        archive.filter(r =>
          r.time >= maxTempStart &&
          r.time > maxStart &&
          r.time <= maxEnd
        );
      
      const maxValues =
        maxRecords
          .map(r => r.temp_hi)
          .filter(v => v != null);
      
      const maxComplete =
        maxEnd <= Date.now() / 1000;
      
      const maxTemp =
        maxComplete &&
        maxValues.length > 0
          ? (
              (Math.max(...maxValues) - 32)
              * 5 / 9
            )
          : null;
      
      const rainStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const rainEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const rainRecords =
        archive.filter(r =>
          r.time > rainStart &&
          r.time <= rainEnd
        );
      
      const rainComplete =
        rainEnd <= Date.now() / 1000;
      
      const rainTotal =
        rainComplete && rainRecords.length > 0
          ? rainRecords.reduce(
              (sum, r) =>
                sum + Number(r.rainfall_mm || 0),
              0
            )
          : null;

      const evapStart =
        new Date(year, month, day - 1, 9, 0, 0).getTime() / 1000;
      
      const evapEnd =
        new Date(year, month, day, 9, 0, 0).getTime() / 1000;
      
      const evapRecords =
        archive.filter(r =>
          r.time > evapStart &&
          r.time <= evapEnd
        );
      
      const evapComplete =
        evapEnd <= Date.now() / 1000;
      
      const evapValues =
        evapRecords
          .map(r => Number(r.et))
          .filter(v => !isNaN(v));
      
      const evapTotal =
        evapComplete && evapRecords.length > 0
          ? evapRecords.reduce(
              (sum, r) =>
                sum + Number(r.et || 0),
              0
            ) * 25.4
          : null;
      const obs9 =
        history.find(r => {
          const t = new Date(r.time * 1000);
      
          return t.getFullYear() === year
            && t.getMonth() === month
            && t.getDate() === day
            && t.getHours() === 9
            && t.getMinutes() === 0;
        });
      
      const obs15 =
        history.find(r => {
          const t = new Date(r.time * 1000);
      
          return t.getFullYear() === year
            && t.getMonth() === month
            && t.getDate() === day
            && t.getHours() === 15
            && t.getMinutes() === 0;
        });
      const dateString =
        `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      
      const manual =
        manualObs.find(r => r.date === dateString);
      const tr = document.createElement("tr");
  
      tr.innerHTML = `
        <td>${day}</td>
        <td>${dayName}</td>
  
        <td>
          ${minTemp != null ? minTemp.toFixed(1) : ""}
        </td>
        
        <td>
          ${maxTemp != null ? maxTemp.toFixed(1) : ""}
        </td>
        <td>
          ${rainTotal != null
              ? rainTotal.toFixed(1)
              : ""}
        </td>
        
        <td>
          ${evapTotal != null
              ? evapTotal.toFixed(1)
              : ""}
        </td>
        
        <td></td>
        
        <td></td>
        <td></td>
        <td></td>
        <td>${obs9 ? obs9.temp_c.toFixed(1) : ""}</td>
        <td>${obs9 ? obs9.humidity.toFixed(0) : ""}</td>
        <td>${manual?.cloud9 || ""}</td>
        <td>${obs9 ? degToCompass(obs9.wind10_dir) : ""}</td>
        <td>${obs9 ? obs9.wind10_kmh.toFixed(0) : ""}</td>
        <td>${obs9 ? obs9.pressure_hpa.toFixed(1) : ""}</td>
        <td>${obs15 ? obs15.temp_c.toFixed(1) : ""}</td>
        <td>${obs15 ? obs15.humidity.toFixed(0) : ""}</td>
        <td>${obs15 ? obs15.humidity.toFixed(0) : ""}</td>
        <td>${obs15 ? degToCompass(obs15.wind10_dir) : ""}</td>
        <td>${obs15 ? obs15.wind10_kmh.toFixed(0) : ""}</td>
        <td>${obs15 ? obs15.pressure_hpa.toFixed(1) : ""}</td>
        <td></td>

      `;
  
      tbody.appendChild(tr);
    }
  }
  
  loadMonthly();
  
  </script>

</body>
</html>
