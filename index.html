<!DOCTYPE html>
<html>
<head>
  <title>Esperence Weather</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1e2d;
      color: white;
      margin: 0;
      text-align: center;
    }

    h1 { margin: 10px 0; }
    #time { margin-bottom: 20px; opacity: 0.8; }

    .section { margin-top: 20px; }

    .section h2 {
      margin-bottom: 10px;
      color: #a0c4ff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      padding: 0 10px;
    }

    .card {
      background: #1f3b4d;
      border-radius: 10px;
      padding: 12px;
    }

    .value {
      font-size: 20px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>Esperence Weather Station</h1>
<h2 id="time"></h2>

<!-- ✅ PRIMARY -->
<div class="section">
  <h2>Current Conditions</h2>
  <div class="grid">
    <div class="card"><div>Temperature</div><div class="value" id="temp"></div></div>
    <div class="card"><div>Dew Point</div><div class="value" id="dew"></div></div>
    <div class="card"><div>Wet Bulb</div><div class="value" id="wetbulb"></div></div>
    <div class="card"><div>Humidity</div><div class="value" id="hum"></div></div>
    <div class="card"><div>Pressure</div><div class="value" id="pressure"></div></div>
  </div>
</div>

<!-- ✅ HEAT -->
<div class="section">
  <h2>Heat & Comfort</h2>
  <div class="grid">
    <div class="card"><div>Heat Index</div><div class="value" id="heat"></div></div>
    <div class="card"><div>Wind Chill</div><div class="value" id="chill"></div></div>
    <div class="card"><div>THW</div><div class="value" id="thw"></div></div>
    <div class="card"><div>THSW</div><div class="value" id="thsw"></div></div>
  </div>
</div>

<!-- ✅ SOLAR -->
<div class="section">
  <h2>Solar</h2>
  <div class="grid">
    <div class="card"><div>Radiation</div><div class="value" id="solar"></div></div>
    <div class="card"><div>UV</div><div class="value" id="uv"></div></div>
  </div>
</div>

<script>

// conversions
function toC(f){ return (f - 32) * 5/9; }
function inHgToHpa(p){ return (p * 33.8639).toFixed(1); }

// wet bulb
function wetBulb(T, RH){
  return T * Math.atan(0.151977 * Math.sqrt(RH + 8.313659)) +
         Math.atan(T + RH) -
         Math.atan(RH - 1.676331) +
         0.00391838 * Math.pow(RH, 1.5) *
         Math.atan(0.023101 * RH) - 4.686035;
}

// clock
function updateTime(){
  document.getElementById("time").innerText =
    new Date().toLocaleString("en-AU",{ timeZone:"Australia/Brisbane" });
}
setInterval(updateTime,1000);
updateTime();

async function loadWeather(){

  const res = await fetch("/esperencewx/weather.json?"+Date.now());
  const data = await res.json();

  let iss = null;
  let pressure = null;

  let extraVals = {}; // ✅ new safe collector

  data.sensors.forEach(sensor=>{
    if(!sensor.data) return;

    const s = sensor.data[0];

    // ✅ ISS (do NOT break this)
    if(s.temp !== undefined && s.hum !== undefined && !iss){
      iss = s;
    }

    if(s.bar_sea_level !== undefined){
      pressure = s.bar_sea_level;
    }

    // ✅ collect optional values safely
    if(s.heat_index !== undefined) extraVals.heat = s.heat_index;
    if(s.wind_chill !== undefined) extraVals.chill = s.wind_chill;
    if(s.thw_index !== undefined) extraVals.thw = s.thw_index;
    if(s.thsw_index !== undefined) extraVals.thsw = s.thsw_index;

    if(s.solar_rad !== undefined) extraVals.solar = s.solar_rad;
    if(s.uv_index !== undefined) extraVals.uv = s.uv_index;

    if(s.wet_leaf_1 !== undefined) extraVals.leaf = s.wet_leaf_1;
  });

  if(!iss) return;

  const tempC = toC(iss.temp);

  document.getElementById("temp").innerText = tempC.toFixed(1)+" °C";
  document.getElementById("dew").innerText = iss.dew_point ? toC(iss.dew_point).toFixed(1)+" °C":"N/A";
  document.getElementById("hum").innerText = iss.hum+" %";

  // ✅ wet bulb
  document.getElementById("wetbulb").innerText =
    wetBulb(tempC, iss.hum).toFixed(1)+" °C";

  // ✅ pressure
  document.getElementById("pressure").innerText =
    pressure ? inHgToHpa(pressure)+" hPa":"N/A";

  // ✅ heat values FIXED
  document.getElementById("heat").innerText =
    extraVals.heat ? toC(extraVals.heat).toFixed(1)+" °C":"N/A";

  document.getElementById("chill").innerText =
    extraVals.chill ? toC(extraVals.chill).toFixed(1)+" °C":"N/A";

  document.getElementById("thw").innerText =
    extraVals.thw ? toC(extraVals.thw).toFixed(1)+" °C":"N/A";

  document.getElementById("thsw").innerText =
    extraVals.thsw ? toC(extraVals.thsw).toFixed(1)+" °C":"N/A";

  // ✅ solar FIXED properly
  document.getElementById("solar").innerText =
    extraVals.solar ? extraVals.solar+" W/m²":"N/A";

  document.getElementById("uv").innerText =
    extraVals.uv !== undefined ? extraVals.uv:"N/A";

}

loadWeather();
setInterval(loadWeather,15000);

</script>

</body>
</html>
