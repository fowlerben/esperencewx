<!DOCTYPE html>
<html>
<head>
  <title>Esperence Weather</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0b1e2d;
      color: white;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1f3b4d;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      width: 220px;
    }
  </style>
</head>
<body>

<h1>Esperence Weather Station</h1>
<h2 id="time"></h2>

<div class="container">

<div class="card"><h2>Temperature</h2><p id="temp"></p></div>
<div class="card"><h2>Humidity</h2><p id="hum"></p></div>
<div class="card"><h2>Dew Point</h2><p id="dew"></p></div>
<div class="card"><h2>Pressure</h2><p id="pressure"></p></div>
<div class="card"><h2>Rain Today</h2><p id="rain"></p></div>

<div class="card">
  <h2>Wind</h2>
  <p id="wind"></p>
  <select id="period">
    <option value="2">2 min</option>
    <option value="10" selected>10 min</option>
    <option value="60">1 hr</option>
  </select>
</div>

</div>

<script>

// ✅ conversions
const toC = f => (f - 32) * 5/9;
const mphToKmh = m => m * 1.60934;
const inHgToHpa = p => p * 33.8639;
const inToMm = i => i * 25.4;

function degToCompass(deg){
  const dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE",
              "S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(deg/22.5)%16];
}

// ✅ time
setInterval(()=>{
  document.getElementById("time").innerText =
    new Date().toLocaleString("en-AU",{timeZone:"Australia/Brisbane"});
},1000);

async function loadWeather(){

  const res = await fetch("/esperencewx/weather.json?"+Date.now());
  const data = await res.json();

  let iss = null;      // outdoor sensor
  let windS = null;    // wind sensor
  let baro = null;     // pressure sensor

  data.sensors.forEach(sensor => {

    if(!sensor.data) return;

    const d = sensor.data[0];

    // ✅ ISS (main outdoor data)
    if(d.temp !== undefined && d.hum !== undefined){
      iss = d;
    }

    // ✅ wind sensor
    if(d.wind_speed_avg_last_10_min !== undefined){
      windS = d;
    }

    // ✅ pressure sensor
    if(d.bar_sea_level !== undefined){
      baro = d;
    }

  });

  if(!iss) return;

  // ✅ temperature
  const tempC = toC(iss.temp);
  document.getElementById("temp").innerText = tempC.toFixed(1) + " °C";

  document.getElementById("hum").innerText = iss.hum + " %";
  document.getElementById("dew").innerText =
    iss.dew_point ? toC(iss.dew_point).toFixed(1) + " °C" : "N/A";

  // ✅ pressure (correct sensor)
  document.getElementById("pressure").innerText =
    baro ? inHgToHpa(baro.bar_sea_level).toFixed(1) + " hPa" : "N/A";

  // ✅ rain
  document.getElementById("rain").innerText =
    iss.rainfall_daily ? inToMm(iss.rainfall_daily).toFixed(2) + " mm" : "0.00 mm";

  // ✅ wind (fixed selector)
  if(windS){

    const p = document.getElementById("period").value;

    let speed = 0;

    if(p==="2") speed = windS.wind_speed_avg_last_2_min;
    if(p==="10") speed = windS.wind_speed_avg_last_10_min;
    if(p==="60") speed = windS.wind_speed_avg_last_60_min;

    const dir = windS.wind_dir_scalar_avg_last_10_min;

    if(speed !== undefined){
      const kmh = mphToKmh(speed);
      document.getElementById("wind").innerText =
        kmh.toFixed(1) + " km/h (" + dir + "°, " + degToCompass(dir) + ")";
    } else {
      document.getElementById("wind").innerText = "N/A";
    }

  }

}

loadWeather();
setInterval(loadWeather,15000);

</script>

</body>
</html>
