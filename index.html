<!DOCTYPE html>
<html>
<head>
  <title>Live Weather</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0b1c2c;
      color: white;
    }
    .data-card {
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      background: #132f4c;
      border-radius: 10px;
    }
    h2 {
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <h1>My Weather Station</h1>

  <div class="data-card">
    <h2>Temperature</h2>
    <p id="temp">Loading...</p>
  </div>

  <div class="data-card">
    <h2>Humidity</h2>
    <p id="humidity">Loading...</p>
  </div>

  <div class="data-card">
    <h2>Wind Speed</h2>
    <p id="wind">Loading...</p>
  </div>

  <script src="script.js"></script>

</body>
</html>
