<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Esperence Weather</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e5e7eb;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    canvas {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>Esperence Weather Dashboard</h1>

<div class="controls">
  <input type="date" id="datePicker">
</div>

<div class="grid">
  <canvas id="tempChart"></canvas>
  <canvas id="humidityChart"></canvas>
  <canvas id="dewChart"></canvas>
  <canvas id="windChart"></canvas>
  <canvas id="pressureChart"></canvas>
  <canvas id="rainChart"></canvas>
  <canvas id="solarChart"></canvas>
  <canvas id="uvChart"></canvas>
</div>

<script src="script7.js"></script>

</body>
</html>
