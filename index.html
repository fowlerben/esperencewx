<script>
async function loadWeather() {
  try {
    const res = await fetch("/esperencewx/weather.json?" + Date.now());
    const text = await res.text();
    const data = JSON.parse(text);

    let temp = "N/A";
    let hum = "N/A";
    let wind = "N/A";

    if (data && data.sensors) {
      data.sensors.forEach(sensor => {
        if (!sensor.data) return;

        sensor.data.forEach(d => {
          if (d.temp !== undefined && temp === "N/A") {
            // ✅ Convert F → C
            const c = (5/9) * (d.temp - 32);
            temp = c.toFixed(1) + " °C";
          }

          if (d.hum !== undefined && hum === "N/A") {
            hum = d.hum + " %";
          }

          if (d.wind_speed_avg_last_1_min !== undefined && wind === "N/A") {
            wind = d.wind_speed_avg_last_1_min.toFixed(1) + " km/h";
          }
        });
      });
    }

    document.getElementById("temp").innerText = temp;
    document.getElementById("humidity").innerText = hum;
    document.getElementById("wind").innerText = wind;

  } catch (err) {
    document.getElementById("temp").innerText = "Error";
    document.getElementById("humidity").innerText = "Error";
    document.getElementById("wind").innerText = "Error";
  }
}

loadWeather();
setInterval(loadWeather, 30000);
</script>
