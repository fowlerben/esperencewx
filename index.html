<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Esperence Weather</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .value {
      font-size: 32px;
      font-weight: bold;
    }

    .small {
      font-size: 14px;
      margin-top: 5px;
      color: #cbd5f5;
    }

    .section-title {
      margin-top: 30px;
      margin-bottom: 10px;
      font-size: 18px;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
    }
  </style>
</head>

<body>

  <h1>Esperence Weather Station</h1>

  <div id="weather">Loading...</div>

  <!-- ✅ CORRECT SCRIPT TAG -->
  <script src="script5.js"></script>

</body>
</html>
