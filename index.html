<!DOCTYPE html>
<html>
<head>
  <title>Esperence Weather</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0b1e2d;
      color: white;
    }
    .card {
      display: inline-block;
      background: #1f3b4d;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      min-width: 150px;
    }
  </style>
</head>
<body>

<h1>Esperence Weather Station</h1>

<div class="card">
  <h2>🌡 Temperature</h2>
  <p id="temp">Loading...</p>
</div>

<div class="card">
  <h2>💧 Humidity</h2>
  <p id="humidity">Loading...</p>
</div>

<div class="card">
  <h2>🌬 Wind</h2>
  <p id="wind">Loading...</p>
</div>

<script>
async function loadWeather() {
  try {
    // ✅ FULL absolute path (this fixes the problem)
    const res = await fetch("/esperencewx/weather.json?cache=" + Date.now());

    if (!res.ok) {
      throw new Error("Fetch failed: " + res.status);
    }

    const data = await res.json();

    let temp = null;
    let hum = null;
    let wind = null;

    for (const sensor of data.sensors) {
      if (!sensor.data || !sensor.data[0]) continue;

      const d = sensor.data[0];

      if (d.temp !== undefined && temp === null) temp = d.temp;
      if (d.hum !== undefined && hum === null) hum = d.hum;
      if (d.wind_speed_avg_last_1_min !== undefined && wind === null) {
        wind = d.wind_speed_avg_last_1_min;
      }
    }

    document.getElementById("temp").innerText =
      temp !== null ? temp + " °C" : "N/A";

    document.getElementById("humidity").innerText =
      hum !== null ? hum + " %" : "N/A";

    document.getElementById("wind").innerText =
      wind !== null ? wind + " km/h" : "N/A";

  } catch (err) {
    console.error("ERROR:", err);

    document.getElementById("temp").innerText = "Error";
    document.getElementById("humidity").innerText = "Error";
    document.getElementById("wind").innerText = "Error";
  }
}

loadWeather();
setInterval(loadWeather, 30000);
</script>

</body>
</html>
``
