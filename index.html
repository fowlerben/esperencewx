<!DOCTYPE html>
<html>
<head>
  <title>Esperence Weather</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1e2d;
      color: white;
      margin: 0;
      text-align: center;
    }

    h1 { margin: 10px 0; }
    #time { margin-bottom: 20px; opacity: 0.8; }

    .section { margin-top: 20px; }

    .section h2 {
      margin-bottom: 10px;
      color: #a0c4ff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      padding: 0 10px;
    }

    .card {
      background: #1f3b4d;
      border-radius: 10px;
      padding: 12px;
    }

    .value {
      font-size: 20px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>Esperence Weather Station</h1>
<h2 id="time"></h2>

<div class="section">
  <h2>Current Conditions</h2>
  <div class="grid">
    <div class="card"><div>Temperature</div><div class="value" id="temp"></div></div>
    <div class="card"><div>Dew Point</div><div class="value" id="dew"></div></div>
    <div class="card"><div>Wet Bulb</div><div class="value" id="wet"></div></div>
    <div class="card"><div>Humidity</div><div class="value" id="hum"></div></div>
    <div class="card"><div>Pressure</div><div class="value" id="pressure"></div></div>
  </div>
</div>

<div class="section">
  <h2>Heat & Comfort</h2>
  <div class="grid">
    <div class="card"><div>Heat Index</div><div class="value" id="heat"></div></div>
    <div class="card"><div>Wind Chill</div><div class="value" id="chill"></div></div>
    <div class="card"><div>THW</div><div class="value" id="thw"></div></div>
    <div class="card"><div>THSW</div><div class="value" id="thsw"></div></div>
  </div>
</div>

<div class="section">
  <h2>Solar</h2>
  <div class="grid">
    <div class="card"><div>Radiation</div><div class="value" id="solar"></div></div>
    <div class="card"><div>UV</div><div class="value" id="uv"></div></div>
  </div>
</div>

<div class="section">
  <h2>Rainfall</h2>
  <div class="grid">
    <div class="card"><div>Rate</div><div class="value" id="rain_rate"></div></div>
    <div class="card"><div>15 min</div><div class="value" id="rain15"></div></div>
    <div class="card"><div>1 hour</div><div class="value" id="rain60"></div></div>
    <div class="card"><div>Today</div><div class="value" id="rainday"></div></div>
  </div>
</div>

<div class="section">
  <h2>Extras</h2>
  <div class="grid">
    <div class="card"><div>Leaf Wetness</div><div class="value" id="leaf"></div></div>
    <div class="card"><div>Temp 1</div><div class="value" id="extra1"></div></div>
    <div class="card"><div>Temp 2</div><div class="value" id="extra2"></div></div>
    <div class="card"><div>Temp 3</div><div class="value" id="extra3"></div></div>
  </div>
</div>

<script>

function toC(f){ return ((f - 32) * 5/9).toFixed(1); }
function inHgToHpa(p){ return (p * 33.8639).toFixed(1); }

function updateTime(){
  document.getElementById("time").innerText =
    new Date().toLocaleString("en-AU",{ timeZone:"Australia/Brisbane" });
}
setInterval(updateTime,1000);
updateTime();

async function loadWeather(){

  const res = await fetch("/esperencewx/weather.json?"+Date.now());
  const data = await res.json();

  let iss=null, baro=null, extra=null, indoor=null;

  data.sensors.forEach(sensor=>{
    if(sensor.lsid === 553786) iss = sensor.data[0];
    if(sensor.lsid === 551509) baro = sensor.data[0];
    if(sensor.lsid === 838746) extra = sensor.data[0];
    if(sensor.lsid === 551510) indoor = sensor.data[0];
  });

  if(!iss) return;

  // ✅ ISS
  document.getElementById("temp").innerText = toC(iss.temp)+" °C";
  document.getElementById("dew").innerText = toC(iss.dew_point)+" °C";
  document.getElementById("wet").innerText = iss.wet_bulb ? toC(iss.wet_bulb)+" °C":"N/A";
  document.getElementById("hum").innerText = iss.hum+" %";

  document.getElementById("heat").innerText = iss.heat_index ? toC(iss.heat_index)+" °C":"N/A";
  document.getElementById("chill").innerText = iss.wind_chill ? toC(iss.wind_chill)+" °C":"N/A";
  document.getElementById("thw").innerText = iss.thw_index ? toC(iss.thw_index)+" °C":"N/A";
  document.getElementById("thsw").innerText = iss.thsw_index ? toC(iss.thsw_index)+" °C":"N/A";

  document.getElementById("solar").innerText = iss.solar_rad ? iss.solar_rad+" W/m²":"N/A";
  document.getElementById("uv").innerText = iss.uv_index ?? "N/A";

  document.getElementById("rain_rate").innerText = iss.rain_rate_last_mm ?? "0";
  document.getElementById("rain15").innerText = iss.rainfall_last_15_min_mm ?? "0";
  document.getElementById("rain60").innerText = iss.rainfall_last_60_min_mm ?? "0";
  document.getElementById("rainday").innerText = iss.rainfall_dailly_mm ?? "0";

  // ✅ BARO
  document.getElementById("pressure").innerText =
    baro ? inHgToHpa(baro.bar_sea_level)+" hPa":"N/A";

  // ✅ EXTRA
  document.getElementById("leaf").innerText = extra?.wet_leaf_1 ?? "N/A";
  document.getElementById("extra1").innerText = extra?.temp_1 ? toC(extra.temp_1)+" °C":"N/A";
  document.getElementById("extra2").innerText = extra?.temp_2 ? toC(extra.temp_2)+" °C":"N/A";
  document.getElementById("extra3").innerText = extra?.temp_3 ? toC(extra.temp_3)+" °C":"N/A";

}

loadWeather();
setInterval(loadWeather,15000);

</script>

</body>
</html>
``
