<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Esperence Weather</title>

  <!-- ✅ FIXED Chart.js -->
  <script src="https://net/npm/chart.js</script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e5e7eb;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
    }

    .title {
      font-size: 14px;
      color: #94a3b8;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #cbd5f5;
    }

    canvas {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
      width: 100%;
      height: 250px;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
  </style>
</head>
