<!DOCTYPE html>
<html>
<head>
  <title>Esperence Weather</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0b1e2d;
      color: white;
    }
    .card {
      display: inline-block;
      background: #1f3b4d;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      min-width: 150px;
    }
  </style>
</head>
<body>

<h1>Esperence Weather Station</h1>

<div class="card">
  <h2>🌡 Temperature</h2>
  <p id="temp">Loading...</p>
</div>

<div class="card">
  <h2>💧 Humidity</h2>
  <p id="humidity">Loading...</p>
</div>

<div class="card">
  <h2>🌬 Wind</h2>
  <p id="wind">Loading...</p>
</div>

<script>
async function loadWeather() {
  try {
    const res = await fetch("/esperencewx/weather.json?" + Date.now());
    const data = await res.json();

    let temp = "N/A";
    let hum = "N/A";
    let wind = "N/A";

    if (data && data.sensors) {
      data.sensors.forEach(sensor => {
        if (!sensor.data || !sensor.data[0]) return;

        const d = sensor.data[0];

        // ✅ Convert Fahrenheit → Celsius
        if (d.temp !== undefined && temp === "N/A") {
          const c = (d.temp - 32) * 5 / 9;
          temp = c.toFixed(1) + " °C";
        }

        // ✅ Humidity already correct
        if (d.hum !== undefined && hum === "N/A") {
          hum = d.hum + " %";
        }

        // ✅ Convert mph → km/h
        if (d.wind_speed_avg_last_1_min !== undefined && wind === "N/A") {
          const kmh = d.wind_speed_avg_last_1_min * 1.60934;
          wind = kmh.toFixed(1) + " km/h";
        }
      });
    }

    document.getElementById("temp").innerText = temp;
    document.getElementById("humidity").innerText = hum;
    document.getElementById("wind").innerText = wind;

  } catch (err) {
    document.getElementById("temp").innerText = "Error";
    document.getElementById("humidity").innerText = "Error";
    document.getElementById("wind").innerText = "Error";
  }
}

loadWeather();
setInterval(loadWeather, 30000);
</script>

</body>
</html>
